<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visitor Guestbook</title>
</head>

<body>
  <h1>Guestbook</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Sign Guestbook</button>
  </form>

  <h2>Entries</h2>

  {% for entry in entries %}
  <div>
    <h3>{{ entry.name }}</h3>
    <p>{{ entry.message }}</p>
    <small>{{ entry.created_at }}</small>
  </div>
  {% empty %}
  <p>No entries yet.</p>
  {% endfor %}
</body>

</html>
